<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title id="pageTitle">Стаття — My Computer Academy</title>
  <meta name="description" id="pageDesc" content="Корисні статті про програмування для дітей від My Computer Academy"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="icon" href="/favicon.ico"/>
  <style>
    .article-hero{padding:80px 0 56px;background:linear-gradient(135deg,#6C47FF 0%,#9333ea 100%);color:#fff}
    .article-hero__badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:13px;font-weight:700;padding:6px 16px;border-radius:100px;margin-bottom:20px}
    .article-hero__title{font-size:clamp(26px,5vw,44px);font-weight:900;line-height:1.15;margin-bottom:20px;max-width:780px}
    .article-hero__meta{display:flex;align-items:center;gap:16px;font-size:14px;color:rgba(255,255,255,.75)}
    .article-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.65);margin-bottom:24px}
    .article-breadcrumb a{color:rgba(255,255,255,.85);font-weight:500}
    .article-breadcrumb a:hover{color:#fff;text-decoration:underline}
    .article-breadcrumb-sep{opacity:.4}
    .article-body{padding:64px 0 80px;background:#fff}
    .article-container{display:grid;grid-template-columns:1fr 320px;gap:48px;max-width:1100px;margin:0 auto;padding:0 24px}
    .article-content{min-width:0}
    .article-content h2{font-size:24px;font-weight:800;color:#1a1a2e;margin:36px 0 14px}
    .article-content h3{font-size:18px;font-weight:700;color:#1a1a2e;margin:28px 0 10px}
    .article-content p{font-size:16px;color:#444;line-height:1.75;margin-bottom:18px}
    .article-content ul,
    .article-content ol{padding-left:24px;margin-bottom:18px}
    .article-content li{font-size:16px;color:#444;line-height:1.7;margin-bottom:6px}
    .article-content strong{color:#1a1a2e;font-weight:700}
    .article-content a{color:#6C47FF;text-decoration:underline}
    .article-content code{background:#f0eeff;color:#6C47FF;padding:2px 7px;border-radius:5px;font-size:14px;font-family:monospace}
    .article-sidebar{position:sticky;top:80px;align-self:start}
    .sidebar-card{background:#f8f7ff;border-radius:16px;padding:24px;border:1.5px solid #e8e4ff;margin-bottom:20px}
    .sidebar-card h3{font-size:15px;font-weight:700;margin-bottom:14px;color:#1a1a2e}
    .sidebar-link{display:block;padding:10px 0;border-bottom:1px solid #e8e4ff;font-size:13px;color:#6C47FF;font-weight:600;text-decoration:none}
    .sidebar-link:hover{color:#5533EE;text-decoration:underline}
    .sidebar-link:last-child{border-bottom:none}
    .sidebar-cta{background:linear-gradient(135deg,#6C47FF,#9333ea);color:#fff;border-radius:16px;padding:24px;text-align:center}
    .sidebar-cta h3{font-size:16px;font-weight:800;margin-bottom:10px;color:#fff}
    .sidebar-cta p{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:16px;line-height:1.5}
    .sidebar-cta a{display:block;background:#fff;color:#6C47FF;font-weight:700;font-size:14px;padding:12px;border-radius:10px;text-decoration:none;transition:transform .2s}
    .sidebar-cta a:hover{transform:translateY(-2px)}
    .article-not-found{text-align:center;padding:100px 20px;color:#888}
    .article-not-found h1{font-size:32px;font-weight:800;margin-bottom:12px;color:#1a1a2e}
    @media(max-width:768px){
      .article-container{grid-template-columns:1fr}
      .article-sidebar{position:static}
      .article-hero{padding:60px 0 40px}
    }
  </style>
</head>
<body>

<header class="header" id="header">
  <div class="container header__inner">
    <a href="/" class="logo">
      <div class="logo__icon"><svg width="20" height="20" viewBox="0 0 32 32" fill="none"><path d="M8 11L13 16L8 21" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 21H24" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <span class="logo__text">My Computer Academy</span>
    </a>
    <nav class="nav" id="navMenu">
      <ul class="nav__list">
        <li><a href="/#courses" class="nav__link">Курси</a></li>
        <li><a href="/#faq" class="nav__link">FAQ</a></li>
        <li><a href="/#contact" class="nav__link">Контакти</a></li>
      </ul>
      <div class="nav__actions">
        <a href="/#contact" class="btn btn--primary btn--sm">Записатись</a>
      </div>
    </nav>
    <button class="nav__burger" id="navBurger" aria-label="Меню" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div id="pageContent">
  <div style="text-align:center;padding:100px 20px;color:#888">Завантаження...</div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer__inner">
      <div class="footer__brand">
        <a href="/" class="logo logo--footer">
          <div class="logo__icon"><svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M8 11L13 16L8 21" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 21H24" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
          <span class="logo__text">My Computer Academy</span>
        </a>
        <p class="footer__tagline">Школа програмування для дітей від 6 до 18 років</p>
      </div>
    </div>
    <div class="footer__bottom">
      <span>© 2025 My Computer Academy. Всі права захищено.</span>
    </div>
  </div>
</footer>

<script>
'use strict';

// Simple header scroll
const header = document.getElementById('header');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

// Burger
const burger = document.getElementById('navBurger');
const navMenu = document.getElementById('navMenu');
burger.addEventListener('click', () => {
  const isOpen = navMenu.classList.toggle('open');
  burger.setAttribute('aria-expanded', String(isOpen));
});

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('uk-UA', {day:'numeric',month:'long',year:'numeric'}); }
  catch { return d; }
}

async function init() {
  const pathMatch = window.location.pathname.match(/\/articles\/([^/?#]+)/);
  const slug = pathMatch ? pathMatch[1] : null;
  if (!slug) { showNotFound(); return; }

  try {
    const res = await fetch('/api/articles');
    if (!res.ok) { showNotFound(); return; }
    const { articles } = await res.json();
    const article = articles.find(a => a.slug === slug && a.active !== false);
    if (!article) { showNotFound(); return; }
    renderArticle(article, articles.filter(a => a.active !== false && a.id !== article.id).slice(0, 4));
  } catch { showNotFound(); }
}

function renderArticle(a, related) {
  document.title = a.title + ' — My Computer Academy';
  document.getElementById('pageDesc')?.setAttribute('content', a.excerpt || a.title);

  document.getElementById('pageContent').innerHTML = `
    <section class="article-hero">
      <div class="container">
        <nav class="article-breadcrumb" aria-label="Навігація">
          <a href="/">Головна</a>
          <span class="article-breadcrumb-sep">›</span>
          <a href="/#articles">Статті</a>
          <span class="article-breadcrumb-sep">›</span>
          <span>${esc(a.title)}</span>
        </nav>
        <div class="article-hero__badge">${a.coverEmoji || '📄'} ${esc(a.category || 'навчання')}</div>
        <h1 class="article-hero__title">${esc(a.title)}</h1>
        <div class="article-hero__meta">
          <span>✍️ ${esc(a.author || 'My Computer Academy')}</span>
          <span>📅 ${formatDate(a.publishedAt)}</span>
        </div>
      </div>
    </section>

    <section class="article-body">
      <div class="article-container">
        <main class="article-content">
          ${a.content || '<p>' + esc(a.excerpt || '') + '</p>'}
        </main>
        <aside class="article-sidebar">
          <div class="sidebar-cta">
            <h3>Запишіть дитину на курс</h3>
            <p>Перший урок безкоштовно — спробуйте без зобов'язань!</p>
            <a href="/#contact">Записатись зараз →</a>
          </div>
          ${related.length ? `
          <div class="sidebar-card">
            <h3>Читайте також</h3>
            ${related.map(r => `<a class="sidebar-link" href="/articles/${esc(r.slug)}">${r.coverEmoji || '📄'} ${esc(r.title)}</a>`).join('')}
          </div>` : ''}
        </aside>
      </div>
    </section>
  `;
}

function showNotFound() {
  document.getElementById('pageContent').innerHTML = `
    <div class="article-not-found">
      <h1>Статтю не знайдено</h1>
      <p>Можливо, вона була видалена або ви помилилися в адресі.</p>
      <a href="/#articles" class="btn btn--primary" style="display:inline-block;margin-top:24px">← Всі статті</a>
    </div>
  `;
}

init();
</script>
</body>
</html>
