name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        id: deploy
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          source: ".,!.git,!.github,!DEPLOY.md,!AGENTS.md,!CLAUDE.md,!SKILLS.md,!diff.txt,!tests,!seo"
          target: "public_html"
          overwrite: true
          strip_components: 1
          timeout: "120s"
          command_timeout: "10m"

      - name: Wait before retry
        if: steps.deploy.outcome == 'failure'
        run: sleep 30

      - name: Deploy via SFTP (retry)
        if: steps.deploy.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          source: ".,!.git,!.github,!DEPLOY.md,!AGENTS.md,!CLAUDE.md,!SKILLS.md,!diff.txt,!tests,!seo"
          target: "public_html"
          overwrite: true
          strip_components: 1
          timeout: "180s"
          command_timeout: "15m"
