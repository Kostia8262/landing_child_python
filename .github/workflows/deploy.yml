name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" \
            -e "
            set ftp:passive-mode true;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            mirror -R --delete --verbose \
              --exclude-glob .git \
              --exclude-glob .github \
              --exclude-glob node_modules \
              --exclude-glob .env \
              --exclude-glob DEPLOY.md \
              --exclude-glob AGENTS.md \
              --exclude-glob CLAUDE.md \
              --exclude-glob SKILLS.md \
              --exclude-glob diff.txt \
              --exclude-glob tests \
              --exclude-glob seo \
              ./ public_html/;
            quit" \
            ${{ secrets.FTP_HOST }}
