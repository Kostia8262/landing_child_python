<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Сторінка не знайдена | My Computer Academy</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<meta name="robots" content="noindex"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,Arial,sans-serif;background:#f0eeff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#1a1a2e}
.card{background:#fff;border-radius:24px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(108,71,255,.12)}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;text-decoration:none;color:inherit}
.logo img{width:40px;height:40px;border-radius:50%}
.logo span{font-weight:800;font-size:16px}
.code{font-size:80px;font-weight:900;color:#6C47FF;line-height:1;margin-bottom:8px}
.emoji{font-size:40px;margin-bottom:16px}
h1{font-size:22px;font-weight:800;margin-bottom:10px}
p{color:#666;font-size:15px;line-height:1.6;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:#6C47FF;color:#fff;border-radius:12px;font-weight:700;font-size:15px;text-decoration:none;transition:background .2s}
.btn:hover{background:#5533EE}
.btn-ghost{background:#f0eeff;color:#6C47FF;margin-left:10px}
.btn-ghost:hover{background:#e0d9ff}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <img src="/android-chrome-192x192.png" alt="My Computer Academy"/>
    <span>My Computer Academy</span>
  </a>
  <div class="code">404</div>
  <div class="emoji">🔍</div>
  <h1>Сторінку не знайдено</h1>
  <p>Можливо, вона була переміщена або ви перейшли за застарілим посиланням. Не хвилюйтеся — ми допоможемо повернутися!</p>
  <div class="actions">
    <a href="/" class="btn">← На головну</a>
    <a href="/#contact" class="btn btn-ghost">Записатися</a>
  </div>
</div>
</body>
</html>
